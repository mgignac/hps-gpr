# HPS GPR analysis configuration tuned for staged UL studies
# - log-space GP fit enabled (pre_log: true)
# - per-dataset resolution-scaled length-scale controls
# - defaults below are for initial 2015 validation; commands can clone/retune for production

# =====================
# Dataset ROOT file paths
# =====================
path_2015: "/sdf/home/e/epeets/move/2015_IMD.root"
path_2016: "/sdf/home/e/epeets/move/EventSelection_Data_10Percent.root"
path_2021: "/sdf/home/e/epeets/run/2021_bump/preselection_invM_psumlt2p8_hists.root"

#MC Paths
path_2021_mc: ""
only_2021_mc: false

# =====================
# Histogram names
# =====================
hist_2015: "invariant_mass"
hist_2016: "h_Minv_General_Final_1"
hist_2021: "preselection/h_invM_8000"

# =====================
# Analysis ranges (GeV)
# =====================
range_2015: [0.020, 0.130]
range_2016: [0.035, 0.210]
range_2021: [0.030, 0.250]

# =====================
# sigma(m) coefficients
# =====================
sigma_coeffs_2015: [-0.0000922283032152, 0.0532190838657]
sigma_coeffs_2016: [0.00038, 0.041, -0.27, 3.49, -11.11]
sigma_coeffs_2021: [0.00286957, -0.00851449, 0.25362319]

# =====================
# f_rad(m) coefficients
# =====================
frad_coeffs_2015: [0.085]
frad_coeffs_2016: [0.05]
frad_coeffs_2021: [0.05]
radiative_penalty_on: false
radiative_penalty_frac_2015: 0.07
radiative_penalty_frac_2016: 0.07
radiative_penalty_frac_2021: 0.07

# =====================
# Dataset activation (baseline: 2015 validation)
# =====================
enable_2015: true
enable_2016: false
enable_2021: false

# =====================
# GP kernel controls
# =====================
kernel_constant_init: 1.0
kernel_constant_bounds: [1.0e-8, 1.0e+18]

# Manual fallbacks (used only if kernel_ls_policy: manual)
kernel_ls_init: 0.03
kernel_ls_bounds: [0.001, 0.5]

# Resolution-scaled policy in x-space. With pre_log=true, x = ln(m)
# so ls bounds are computed in log-mass units independently per dataset.
kernel_ls_policy: "resolution_scaled_local"
kernel_ls_res_lower_factor: 0.5
kernel_ls_res_upper_factor: 8.0
kernel_ls_res_stat: "median"
kernel_ls_res_npts: 300

# Per-dataset independent scaling factors
kernel_ls_res_lower_factor_by_dataset:
  "2015": 0.5
  "2016": 0.5
  "2021": 0.5
kernel_ls_res_upper_factor_by_dataset:
  "2015": 8.0
  "2016": 8.0
  "2021": 9.0

# Optional explicit dataset hard bounds in x=ln(m) units; keep empty to use resolution scaling
kernel_ls_bounds_by_dataset: {}
kernel_ls_init_by_dataset: {}

kernel_ls_local_hi_floor_mode: "dataset_stat"
kernel_ls_local_hi_floor_factor: 0.8
kernel_ls_local_hi_cap_xrange_frac: 0.25

# =====================
# Preprocessing
# =====================
pre_log: true
pre_zero_alpha: 1.0
alpha_model: "1/y"
pre_alpha_first_n: 0
pre_alpha_first_factor: 0.1

# =====================
# Scan controls
# =====================
mass_step_gev: 0.001
blind_nsigma: 1.64
gp_train_exclude_nsigma: 1.64
neighborhood_rebin: 5
n_restarts: 12

scan_parallel: true
scan_n_workers: 5
scan_parallel_backend: "loky"
scan_threads_per_worker: 2
scan_diagnostic_plot_every_n: 5
scan_diagnostic_zoom_half_sigma: 0.5

scan_require_two_sidebands: false
scan_edge_guard_nsigma: 1.64

# =====================
# CLs + limit bands
# =====================
cls_alpha: 0.05
cls_mode: "asymptotic"
cls_num_toys: 100
cls_seed_base: 12345

make_ul_bands: true
ul_bands_toys: 100 #500
ul_bands_seed: 12345
ul_bands_n_workers: 5
ul_bands_parallel_backend: "loky"
ul_bands_threads_per_worker: 1
ul_bands_refit_gp_on_toy: false
ul_bands_refit_gp_restarts: 0
ul_bands_refit_gp_optimize: true
ul_bands_train_exclude_nsigma: 1.64

# Combined expected bands (off for now)
do_combined_bands: false
combined_bands_n_toys: 500
combined_bands_seed: 24680

# Visibility policy
# (set to expected_only for blinded workflows if needed)
data_visibility:
  "2015": "observed"
  "2016": "observed"
  "2021": "observed"

# =====================
# Injection/extraction
# =====================
inject_signal: false
inj_dataset_key: "2015"
inj_masses_gev: [0.030, 0.060, 0.090]
inj_strengths: [0, 100, 200, 500, 1000, 2000, 5000]
inj_mode: "multinomial"
extract_allow_negative: true
inj_strength_mode: "absolute"
inj_sigma_a_source: "asimov"
inj_shape_mode: "full"
inj_refit_gp_on_toy: false
inj_refit_gp_restarts: 0
inj_refit_gp_optimize: true
inj_train_exclude_nsigma: 1.64
inj_sigma_multipliers: [0.0, 1.0, 2.0, 3.0, 5.0]
mvn_trunc_method: "reject_then_clip"
mvn_trunc_max_tries: 80

# =====================
# Combined fits
# =====================
do_combined: false
eps2_lrt_scale: 1.0e10

# =====================
# Band output controls
# =====================
run_limit_bands_on: "2015"
make_eps2_bands: true

# =====================
# Output + debug
# =====================
output_dir: "outputs/hps_gpr"
debug_print: true
debug_max_errors: 10
fail_fast: false
save_per_mass_folders: true
save_plots: true
save_fit_json: true
