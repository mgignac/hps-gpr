# Small expected-band test config (100 toys max), runnable for either 2015 or 2016
# using `hps-gpr bands --dataset 2015` and `--dataset 2016`.

path_2015: "/sdf/home/e/epeets/move/2015_IMD.root"
path_2016: "/sdf/home/e/epeets/move/EventSelection_Data_10Percent.root"

hist_2015: "invariant_mass"
hist_2016: "h_Minv_General_Final_1"

enable_2015: true
enable_2016: true
enable_2021: false

mass_step_gev: 0.001
scan_parallel: false
n_restarts: 4

make_ul_bands: true
ul_bands_toys: 100
ul_bands_n_workers: 5
ul_bands_threads_per_worker: 2

save_plots: true
save_fit_json: true
output_dir: "outputs/test_bands_2015_2016_100toys"
